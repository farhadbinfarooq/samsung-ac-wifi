<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="820" height="440" fill="#1a1a2e" rx="12"/>
  <text x="410" y="32" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">Non-Invasive Wiring — Separate IR LED + Receiver Circuit</text>

  <!-- ESP32 Board -->
  <rect x="20" y="55" width="165" height="340" rx="8" fill="#2d2d44" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="103" y="76" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="bold">ESP32</text>

  <!-- 5V pin -->
  <rect x="153" y="90" width="32" height="18" rx="3" fill="#c0392b"/>
  <text x="169" y="103" text-anchor="middle" fill="white" font-size="9" font-weight="bold">5V</text>
  <text x="110" y="103" text-anchor="end" fill="#e0e0e0" font-size="10">5V</text>

  <!-- 3.3V pin -->
  <rect x="153" y="116" width="32" height="18" rx="3" fill="#e67e22"/>
  <text x="169" y="129" text-anchor="middle" fill="white" font-size="8" font-weight="bold">3V3</text>
  <text x="110" y="129" text-anchor="end" fill="#e0e0e0" font-size="10">3.3V</text>

  <!-- GND pin -->
  <rect x="153" y="142" width="32" height="18" rx="3" fill="#555"/>
  <text x="169" y="155" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GND</text>
  <text x="110" y="155" text-anchor="end" fill="#e0e0e0" font-size="10">GND</text>

  <!-- GPIO4 TX -->
  <rect x="153" y="196" width="32" height="18" rx="3" fill="#27ae60"/>
  <text x="169" y="209" text-anchor="middle" fill="white" font-size="9" font-weight="bold">IO4</text>
  <text x="110" y="209" text-anchor="end" fill="#e0e0e0" font-size="10">GPIO4</text>
  <text x="110" y="221" text-anchor="end" fill="#888" font-size="8">TX</text>

  <!-- GPIO15 RX -->
  <rect x="153" y="256" width="32" height="18" rx="3" fill="#8e44ad"/>
  <text x="169" y="269" text-anchor="middle" fill="white" font-size="9" font-weight="bold">IO15</text>
  <text x="110" y="269" text-anchor="end" fill="#e0e0e0" font-size="10">GPIO15</text>
  <text x="110" y="281" text-anchor="end" fill="#888" font-size="8">RX</text>

  <!-- ── IR TRANSMITTER ── -->
  <text x="390" y="68" text-anchor="middle" fill="#f39c12" font-size="11">IR TRANSMITTER CIRCUIT</text>
  <rect x="300" y="78" width="150" height="195" rx="6" fill="#252540" stroke="#f39c12" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Resistor 1kΩ -->
  <rect x="230" y="199" width="58" height="16" rx="4" fill="#3d3d00" stroke="#f39c12" stroke-width="1"/>
  <text x="259" y="210" text-anchor="middle" fill="#f39c12" font-size="9">1kΩ</text>

  <!-- Wire GPIO4 → resistor -->
  <line x1="185" y1="205" x2="230" y2="205" stroke="#27ae60" stroke-width="2"/>
  <!-- Wire resistor → base -->
  <line x1="288" y1="205" x2="318" y2="205" stroke="#27ae60" stroke-width="2"/>

  <!-- BC547 transistor -->
  <circle cx="350" cy="196" r="22" fill="none" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="318" y1="196" x2="333" y2="196" stroke="#f39c12" stroke-width="2"/>
  <line x1="333" y1="181" x2="333" y2="211" stroke="#f39c12" stroke-width="2"/>
  <line x1="333" y1="184" x2="356" y2="171" stroke="#f39c12" stroke-width="2"/>
  <line x1="333" y1="208" x2="356" y2="221" stroke="#f39c12" stroke-width="2"/>
  <polygon points="353,219 360,224 356,214" fill="#f39c12"/>
  <text x="346" y="191" fill="#f0c040" font-size="9">BC547</text>
  <text x="312" y="240" fill="#888" font-size="8">NPN</text>
  <text x="311" y="200" fill="#888" font-size="8">B</text>
  <text x="358" y="168" fill="#888" font-size="8">C</text>
  <text x="358" y="234" fill="#888" font-size="8">E</text>

  <!-- IR LED -->
  <ellipse cx="400" cy="138" rx="16" ry="16" fill="#1a1a00" stroke="#f39c12" stroke-width="1.5"/>
  <text x="400" y="134" text-anchor="middle" fill="#f39c12" font-size="7">IR</text>
  <text x="400" y="144" text-anchor="middle" fill="#f39c12" font-size="7">LED</text>
  <line x1="414" y1="125" x2="425" y2="115" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="418" y1="132" x2="431" y2="127" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="434" y="115" fill="#ffff00" font-size="8">940nm</text>

  <!-- Collector → LED anode -->
  <line x1="356" y1="171" x2="385" y2="138" stroke="#f39c12" stroke-width="1.5"/>

  <!-- LED cathode → 5V rail (red solid) -->
  <line x1="400" y1="122" x2="400" y2="86" stroke="#c0392b" stroke-width="2"/>
  <line x1="400" y1="86" x2="185" y2="86" stroke="#c0392b" stroke-width="2"/>
  <line x1="185" y1="86" x2="185" y2="99" stroke="#c0392b" stroke-width="2"/>
  <text x="290" y="82" text-anchor="middle" fill="#c0392b" font-size="9">5V → IR LED(+)</text>

  <!-- Emitter → GND -->
  <line x1="356" y1="221" x2="356" y2="265" stroke="#555" stroke-width="2"/>
  <line x1="356" y1="265" x2="185" y2="265" stroke="#555" stroke-width="2"/>
  <line x1="185" y1="265" x2="185" y2="151" stroke="#555" stroke-width="2"/>

  <!-- Labels in box -->
  <text x="308" y="258" fill="#888" font-size="9">Base ← GPIO4 via 1kΩ</text>
  <text x="308" y="270" fill="#888" font-size="9">Collector → IR LED (+)</text>
  <text x="308" y="282" fill="#888" font-size="9">Emitter → GND</text>

  <!-- ── VS1838B RECEIVER ── -->
  <text x="640" y="68" text-anchor="middle" fill="#8e44ad" font-size="11">IR RECEIVER (VS1838B)</text>
  <rect x="530" y="78" width="255" height="175" rx="6" fill="#252540" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- VS1838B body -->
  <rect x="592" y="108" width="72" height="84" rx="6" fill="#1a0030" stroke="#8e44ad" stroke-width="1.5"/>
  <rect x="592" y="108" width="72" height="10" rx="3" fill="#8e44ad" opacity="0.4"/>
  <text x="628" y="140" text-anchor="middle" fill="#8e44ad" font-size="9" font-weight="bold">VS1838B</text>
  <text x="628" y="154" text-anchor="middle" fill="#8e44ad" font-size="8">38 kHz</text>
  <text x="628" y="167" text-anchor="middle" fill="#666" font-size="8">(flat side up)</text>

  <!-- OUT pin 1 -->
  <line x1="592" y1="178" x2="558" y2="178" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="556" cy="178" r="3" fill="#8e44ad"/>
  <text x="552" y="175" text-anchor="end" fill="#8e44ad" font-size="9">OUT</text>
  <text x="552" y="185" text-anchor="end" fill="#666" font-size="8">pin 1</text>

  <!-- GND pin 2 -->
  <line x1="628" y1="192" x2="628" y2="214" stroke="#555" stroke-width="2"/>
  <circle cx="628" cy="216" r="3" fill="#555"/>
  <text x="630" y="226" fill="#888" font-size="9">GND</text>
  <text x="630" y="236" fill="#666" font-size="8">pin 2</text>

  <!-- VCC pin 3 -->
  <line x1="664" y1="192" x2="664" y2="214" stroke="#e67e22" stroke-width="2"/>
  <circle cx="664" cy="216" r="3" fill="#e67e22"/>
  <text x="666" y="226" fill="#e67e22" font-size="9">VCC</text>
  <text x="666" y="236" fill="#666" font-size="8">pin 3</text>
  <text x="666" y="246" fill="#e67e22" font-size="8">3.3V</text>

  <!-- OUT → GPIO15 -->
  <line x1="556" y1="178" x2="500" y2="178" stroke="#8e44ad" stroke-width="2"/>
  <line x1="500" y1="178" x2="500" y2="265" stroke="#8e44ad" stroke-width="2"/>
  <line x1="500" y1="265" x2="185" y2="265" stroke="#8e44ad" stroke-width="2"/>

  <!-- GND pin2 → shared GND -->
  <line x1="628" y1="216" x2="628" y2="252" stroke="#555" stroke-width="2"/>
  <line x1="628" y1="252" x2="480" y2="252" stroke="#555" stroke-width="2"/>
  <line x1="480" y1="252" x2="480" y2="267" stroke="#555" stroke-width="2"/>
  <line x1="480" y1="267" x2="185" y2="267" stroke="#555" stroke-width="2"/>

  <!-- VCC pin3 → 3.3V rail (orange dashed) -->
  <line x1="664" y1="216" x2="664" y2="260" stroke="#e67e22" stroke-width="2"/>
  <line x1="664" y1="260" x2="470" y2="260" stroke="#e67e22" stroke-width="2"/>
  <line x1="470" y1="260" x2="470" y2="112" stroke="#e67e22" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="470" y1="112" x2="185" y2="112" stroke="#e67e22" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="185" y1="112" x2="185" y2="125" stroke="#e67e22" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="490" y="108" fill="#e67e22" font-size="9">3.3V → VS1838B VCC</text>

  <!-- Legend -->
  <rect x="20" y="410" width="780" height="22" rx="4" fill="#252540"/>
  <line x1="30" y1="421" x2="55" y2="421" stroke="#c0392b" stroke-width="2"/>
  <text x="60" y="425" fill="#e0e0e0" font-size="10">5V (IR LED)</text>
  <line x1="145" y1="421" x2="170" y2="421" stroke="#e67e22" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="175" y="425" fill="#e0e0e0" font-size="10">3.3V (VS1838B VCC)</text>
  <line x1="310" y1="421" x2="335" y2="421" stroke="#555" stroke-width="2"/>
  <text x="340" y="425" fill="#e0e0e0" font-size="10">GND</text>
  <line x1="380" y1="421" x2="405" y2="421" stroke="#27ae60" stroke-width="2"/>
  <text x="410" y="425" fill="#e0e0e0" font-size="10">GPIO4 TX</text>
  <line x1="480" y1="421" x2="505" y2="421" stroke="#8e44ad" stroke-width="2"/>
  <text x="510" y="425" fill="#e0e0e0" font-size="10">GPIO15 RX</text>
  <line x1="580" y1="421" x2="605" y2="421" stroke="#f39c12" stroke-width="2"/>
  <text x="610" y="425" fill="#e0e0e0" font-size="10">BC547 circuit</text>
</svg>
