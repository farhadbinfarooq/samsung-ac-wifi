<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">Non-Invasive Wiring — Separate IR LED + Receiver Circuit</text>

  <!-- ESP32 Board -->
  <rect x="20" y="55" width="160" height="320" rx="8" fill="#2d2d44" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="100" y="76" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="bold">ESP32</text>

  <!-- 3.3V -->
  <rect x="148" y="92" width="32" height="18" rx="3" fill="#e74c3c"/>
  <text x="164" y="105" text-anchor="middle" fill="white" font-size="9" font-weight="bold">3V3</text>
  <text x="105" y="105" text-anchor="end" fill="#e0e0e0" font-size="10">3.3V</text>

  <!-- GND -->
  <rect x="148" y="118" width="32" height="18" rx="3" fill="#555"/>
  <text x="164" y="131" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GND</text>
  <text x="105" y="131" text-anchor="end" fill="#e0e0e0" font-size="10">GND</text>

  <!-- GPIO4 TX -->
  <rect x="148" y="170" width="32" height="18" rx="3" fill="#27ae60"/>
  <text x="164" y="183" text-anchor="middle" fill="white" font-size="9" font-weight="bold">IO4</text>
  <text x="105" y="183" text-anchor="end" fill="#e0e0e0" font-size="10">GPIO4</text>
  <text x="105" y="196" text-anchor="end" fill="#888" font-size="8">TX</text>

  <!-- GPIO15 RX -->
  <rect x="148" y="220" width="32" height="18" rx="3" fill="#8e44ad"/>
  <text x="164" y="233" text-anchor="middle" fill="white" font-size="9" font-weight="bold">IO15</text>
  <text x="105" y="233" text-anchor="end" fill="#e0e0e0" font-size="10">GPIO15</text>
  <text x="105" y="246" text-anchor="end" fill="#888" font-size="8">RX</text>

  <!-- IR TRANSMITTER section label -->
  <text x="400" y="68" text-anchor="middle" fill="#f39c12" font-size="11">IR TRANSMITTER CIRCUIT</text>

  <!-- Transistor circuit box -->
  <rect x="310" y="80" width="130" height="180" rx="6" fill="#252540" stroke="#f39c12" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Resistor 100ohm -->
  <rect x="248" y="173" width="50" height="16" rx="4" fill="#3d3d00" stroke="#f39c12" stroke-width="1"/>
  <text x="273" y="184" text-anchor="middle" fill="#f39c12" font-size="9">1kΩ</text>

  <!-- Wire GPIO4 to resistor -->
  <line x1="180" y1="179" x2="248" y2="179" stroke="#27ae60" stroke-width="2"/>
  <!-- Wire resistor to base -->
  <line x1="298" y1="179" x2="330" y2="179" stroke="#27ae60" stroke-width="2"/>

  <!-- BC547 transistor symbol -->
  <circle cx="360" cy="170" r="22" fill="none" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="330" y1="170" x2="345" y2="170" stroke="#f39c12" stroke-width="2"/>
  <line x1="345" y1="155" x2="345" y2="185" stroke="#f39c12" stroke-width="2"/>
  <line x1="345" y1="158" x2="368" y2="145" stroke="#f39c12" stroke-width="2"/>
  <line x1="345" y1="182" x2="368" y2="195" stroke="#f39c12" stroke-width="2"/>
  <polygon points="365,193 372,198 368,188" fill="#f39c12"/>
  <text x="358" y="165" fill="#f0c040" font-size="9">BC547</text>
  <text x="325" y="215" fill="#888" font-size="8">NPN</text>

  <!-- Pin labels -->
  <text x="322" y="175" fill="#888" font-size="8">B</text>
  <text x="370" y="142" fill="#888" font-size="8">C</text>
  <text x="370" y="208" fill="#888" font-size="8">E</text>

  <!-- IR LED -->
  <ellipse cx="415" cy="118" rx="15" ry="15" fill="#1a1a00" stroke="#f39c12" stroke-width="1.5"/>
  <text x="415" y="114" text-anchor="middle" fill="#f39c12" font-size="7">IR</text>
  <text x="415" y="124" text-anchor="middle" fill="#f39c12" font-size="7">LED</text>
  <!-- emission -->
  <line x1="428" y1="106" x2="438" y2="97" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="432" y1="112" x2="444" y2="107" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="445" y="100" fill="#ffff00" font-size="8">940nm</text>

  <!-- Collector to LED anode -->
  <line x1="368" y1="145" x2="400" y2="118" stroke="#f39c12" stroke-width="1.5"/>
  <!-- LED cathode to 3.3V rail -->
  <line x1="415" y1="103" x2="415" y2="88" stroke="#e74c3c" stroke-width="2"/>
  <line x1="415" y1="88" x2="180" y2="88" stroke="#e74c3c" stroke-width="2"/>
  <line x1="180" y1="88" x2="180" y2="101" stroke="#e74c3c" stroke-width="2"/>

  <!-- Emitter to GND -->
  <line x1="368" y1="195" x2="368" y2="235" stroke="#555" stroke-width="2"/>
  <line x1="368" y1="235" x2="180" y2="235" stroke="#555" stroke-width="2"/>
  <line x1="180" y1="235" x2="180" y2="127" stroke="#555" stroke-width="2"/>

  <!-- Labels inside box -->
  <text x="318" y="248" fill="#888" font-size="9">Base ← GPIO4 via 1kΩ</text>
  <text x="318" y="260" fill="#888" font-size="9">Collector → IR LED(+)</text>
  <text x="318" y="272" fill="#888" font-size="9">Emitter → GND</text>

  <!-- VS1838B Receiver section -->
  <text x="620" y="68" text-anchor="middle" fill="#8e44ad" font-size="11">IR RECEIVER (VS1838B)</text>
  <rect x="520" y="80" width="240" height="160" rx="6" fill="#252540" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- VS1838B chip body -->
  <rect x="580" y="110" width="70" height="80" rx="6" fill="#1a0030" stroke="#8e44ad" stroke-width="1.5"/>
  <!-- Flat side indicator -->
  <rect x="580" y="110" width="70" height="10" rx="3" fill="#8e44ad" opacity="0.4"/>
  <text x="615" y="140" text-anchor="middle" fill="#8e44ad" font-size="9" font-weight="bold">VS1838B</text>
  <text x="615" y="155" text-anchor="middle" fill="#8e44ad" font-size="8">38 kHz</text>
  <text x="615" y="167" text-anchor="middle" fill="#666" font-size="8">(flat side up)</text>

  <!-- VS1838B pins: left=OUT, middle=GND, right=VCC -->
  <!-- OUT pin (left) -->
  <line x1="580" y1="175" x2="550" y2="175" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="548" cy="175" r="3" fill="#8e44ad"/>
  <text x="544" y="172" text-anchor="end" fill="#8e44ad" font-size="9">OUT</text>
  <text x="544" y="183" text-anchor="end" fill="#666" font-size="8">pin 1</text>

  <!-- GND pin (middle) -->
  <line x1="615" y1="190" x2="615" y2="210" stroke="#555" stroke-width="2"/>
  <circle cx="615" cy="212" r="3" fill="#555"/>
  <text x="617" y="222" fill="#888" font-size="9">GND</text>
  <text x="617" y="232" fill="#666" font-size="8">pin 2</text>

  <!-- VCC pin (right) -->
  <line x1="650" y1="190" x2="650" y2="210" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="650" cy="212" r="3" fill="#e74c3c"/>
  <text x="652" y="222" fill="#e74c3c" font-size="9">VCC</text>
  <text x="652" y="232" fill="#666" font-size="8">pin 3</text>
  <text x="652" y="242" fill="#666" font-size="8">3.3V</text>

  <!-- OUT wire to GPIO15 -->
  <line x1="548" y1="175" x2="490" y2="175" stroke="#8e44ad" stroke-width="2"/>
  <line x1="490" y1="175" x2="490" y2="233" stroke="#8e44ad" stroke-width="2"/>
  <line x1="490" y1="233" x2="180" y2="233" stroke="#8e44ad" stroke-width="2"/>

  <!-- GND wire -->
  <line x1="615" y1="212" x2="615" y2="240" stroke="#555" stroke-width="2"/>
  <line x1="615" y1="240" x2="470" y2="240" stroke="#555" stroke-width="2"/>
  <line x1="470" y1="240" x2="470" y2="237" stroke="#555" stroke-width="2"/>
  <line x1="470" y1="237" x2="180" y2="237" stroke="#555" stroke-width="2"/>

  <!-- VCC wire from 3.3V rail -->
  <line x1="650" y1="212" x2="650" y2="250" stroke="#e74c3c" stroke-width="2"/>
  <line x1="650" y1="250" x2="460" y2="250" stroke="#e74c3c" stroke-width="2"/>
  <line x1="460" y1="250" x2="460" y2="88" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="460" y1="88" x2="180" y2="88" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Legend -->
  <rect x="20" y="392" width="760" height="22" rx="4" fill="#252540"/>
  <line x1="30" y1="403" x2="55" y2="403" stroke="#e74c3c" stroke-width="2"/>
  <text x="60" y="407" fill="#e0e0e0" font-size="10">3.3V</text>
  <line x1="100" y1="403" x2="125" y2="403" stroke="#555" stroke-width="2"/>
  <text x="130" y="407" fill="#e0e0e0" font-size="10">GND</text>
  <line x1="170" y1="403" x2="195" y2="403" stroke="#27ae60" stroke-width="2"/>
  <text x="200" y="407" fill="#e0e0e0" font-size="10">GPIO4 TX</text>
  <line x1="265" y1="403" x2="290" y2="403" stroke="#8e44ad" stroke-width="2"/>
  <text x="295" y="407" fill="#e0e0e0" font-size="10">GPIO15 RX (VS1838B OUT)</text>
  <line x1="470" y1="403" x2="495" y2="403" stroke="#f39c12" stroke-width="2"/>
  <text x="500" y="407" fill="#e0e0e0" font-size="10">BC547 TX Circuit</text>
</svg>
